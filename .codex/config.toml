# Codex プロジェクト設定
#
# このファイルはワークスペースレベルで自動的に読み込まれる。
# グローバル設定（~/.codex/config.toml）より優先される。
#
# 参考: https://developers.openai.com/codex/config-reference/

# =============================================================================
# 基本設定
# =============================================================================

# 使用するモデル
model = "gpt-5.2-codex"

# デフォルトプロファイル
profile = "autonomous"

# =============================================================================
# サンドボックス設定
# =============================================================================

# サンドボックスモード
# - "read-only"           : 読取のみ（最も安全）
# - "workspace-write"     : 作業領域内で読取・編集・実行可能（推奨）
# - "danger-full-access"  : 全アクセス許可（非推奨）
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
# ネットワークアクセス（CLI版はオン/オフのみ、ドメイン制御はCloud版で設定）
network_access = true

# 追加の書き込み許可パス
# プロジェクトルート全体への書き込みを許可（コミット操作を含む）
# "." はワークスペースルートを指し、.git ディレクトリも含む
writable_roots = ["."]

# 一時ディレクトリへのアクセス
exclude_tmpdir_env_var = true  # $TMPDIR を許可
exclude_slash_tmp = true       # /tmp を許可

# =============================================================================
# 承認ポリシー
# =============================================================================

# 承認ポリシー
# - "untrusted"   : 安全でない操作は承認を要求（デフォルト・推奨）
# - "on-failure"  : サンドボックス内で実行し、失敗時のみ承認要求
# - "on-request"  : モデルが判断
# - "never"       : 承認を要求しない（危険・非推奨）
approval_policy = "untrusted"

# =============================================================================
# シェル環境ポリシー
# =============================================================================

[shell_environment_policy]
# 環境変数の継承
# - "none" : 継承しない（最も安全）
# - "all"  : すべて継承
inherit = "none"

# 除外する環境変数パターン（グロブ形式）
# シークレットや認証情報の漏洩を防ぐ
exclude = [
    # クラウド認証情報
    "AWS_*",
    "AZURE_*",
    "GOOGLE_*",
    "GCP_*",
    # API キー
    "*_API_KEY",
    "*_SECRET*",
    "*_TOKEN",
    "*_PASSWORD",
    # データベース
    "DATABASE_*",
    "DB_*",
    "*_CONNECTION_STRING",
    # その他機密情報
    "PRIVATE_*",
    "CREDENTIALS_*",
]

# 許可する環境変数（include_only が設定されている場合、これらのみ許可）
# include_only = ["PATH", "HOME", "LANG", "TERM"]

# 明示的に設定する環境変数
[shell_environment_policy.set]
PATH = "/usr/local/bin:/usr/bin:/bin"
LANG = "en_US.UTF-8"
# NODE_ENV = "development"
# PYTHONPATH = ""

# =============================================================================
# プロファイル設定
# =============================================================================

# 自律開発モード（推奨）
[profiles.autonomous]
sandbox_mode = "workspace-write"
approval_policy = "never"

# 調査・分析モード（読取のみ）
[profiles.research]
sandbox_mode = "read-only"
approval_policy = "untrusted"

# 開発モード（ネットワークアクセス有効）
# 注意: セキュリティリスクを理解した上で使用すること
[profiles.development]
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[profiles.development.sandbox_workspace_write]
network_access = true

# =============================================================================
# 機能フラグ
# =============================================================================

[features]
# Web検索機能（市場調査・競合分析用）
# 有効化する場合は true に設定
web_search_request = true

# シェルスナップショット
shell_snapshot = true

# =============================================================================
# MCP サーバー設定
# =============================================================================

# -----------------------------------------------------------------------------
# Playwright（UI/UX 自動検証用）
# Web アプリ開発時にスクリーンショット取得・レスポンシブテスト・ビジュアル確認
# 参考: https://github.com/anthropics/mcp-playwright
# -----------------------------------------------------------------------------
[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
tool_allowlist = [
    "browser_navigate",      # ページ遷移
    "browser_screenshot",    # スクリーンショット取得
    "browser_click",         # 要素クリック
    "browser_fill",          # フォーム入力
    "browser_evaluate",      # JavaScript 実行
    "browser_select",        # セレクト要素操作
    "browser_hover",         # ホバー状態確認
    "browser_resize",        # ビューポートサイズ変更（レスポンシブテスト）
]

# -----------------------------------------------------------------------------
# Puppeteer（Playwright の代替オプション）
# 軽量なブラウザ操作が必要な場合に使用
# -----------------------------------------------------------------------------
# [mcp_servers.puppeteer]
# command = "npx"
# args = ["-y", "@anthropic/mcp-puppeteer"]
# tool_allowlist = ["puppeteer_navigate", "puppeteer_screenshot"]

# -----------------------------------------------------------------------------
# Filesystem（プロジェクト内ファイル操作拡張）
# 画像アセット管理やスクリーンショット保存に使用
# -----------------------------------------------------------------------------
# [mcp_servers.filesystem]
# command = "npx"
# args = ["-y", "@anthropic/mcp-filesystem", "--root", "."]
# tool_allowlist = ["read_file", "write_file", "list_directory"]

# -----------------------------------------------------------------------------
# カスタム MCP サーバー（例）
# プロジェクト固有のツールが必要な場合に追加
# -----------------------------------------------------------------------------
# [mcp_servers.example]
# command = "npx"
# args = ["-y", "@example/mcp-server"]
# env = { EXAMPLE_API_KEY = "..." }
# tool_allowlist = ["tool1", "tool2"]

# =============================================================================
# 監視・テレメトリ
# =============================================================================

# [telemetry]
# ユーザープロンプトのログ（プライバシー考慮でデフォルトはfalse）
# log_user_prompt = false
