# Codex Requirements（管理者制約）テンプレート
#
# このファイルはセキュリティ上重要な設定を強制し、ユーザーによる上書きを防ぐ。
# エンタープライズ環境で MDM 経由で配布する場合に使用。
#
# 使い方:
#   1. このファイルを ~/.codex/requirements.toml にコピー
#   2. 必要な制約を有効化
#
# 注意: このファイルの設定はユーザーの config.toml より優先され、
#       ユーザーはオーバーライドできない
#
# 参考: https://developers.openai.com/codex/security/

# =============================================================================
# 許可されるサンドボックスモード
# =============================================================================

# ユーザーが選択できるサンドボックスモードを制限
# "danger-full-access" を除外することで、完全アクセスを禁止
allowed_sandbox_modes = [
    "read-only",
    "workspace-write",
    # "danger-full-access",  # 意図的に除外（セキュリティリスク）
]

# =============================================================================
# 許可される承認ポリシー
# =============================================================================

# ユーザーが選択できる承認ポリシーを制限
# "never" を除外することで、常に何らかの承認プロセスを維持
allowed_approval_policies = [
    "untrusted",
    "on-failure",
    "on-request",
    # "never",  # 意図的に除外（危険な操作が無確認で実行される可能性）
]

# =============================================================================
# ネットワークアクセス制約
# =============================================================================

# ネットワークアクセスのデフォルト値を強制
# true にすると、ユーザーはネットワークアクセスを無効化できない
# force_network_access = false

# ネットワークアクセスを常に無効化（最も安全）
# true にすると、ユーザーはネットワークアクセスを有効化できない
# deny_network_access = false

# =============================================================================
# 環境変数の強制除外
# =============================================================================

# これらの環境変数パターンは常に除外される（ユーザーが include しても無視）
[shell_environment_policy]
force_exclude = [
    # 認証情報（絶対に漏洩させてはならない）
    "AWS_ACCESS_KEY_ID",
    "AWS_SECRET_ACCESS_KEY",
    "AWS_SESSION_TOKEN",
    "AZURE_*",
    "GOOGLE_APPLICATION_CREDENTIALS",
    "GCP_*",

    # API キー
    "OPENAI_API_KEY",
    "ANTHROPIC_API_KEY",
    "*_API_KEY",
    "*_API_SECRET",

    # データベース認証
    "DATABASE_URL",
    "DATABASE_PASSWORD",
    "MONGO_*",
    "REDIS_*",
    "POSTGRES_*",
    "MYSQL_*",

    # SSH・GPG
    "SSH_*",
    "GPG_*",

    # その他機密情報
    "*_SECRET",
    "*_TOKEN",
    "*_PASSWORD",
    "*_PRIVATE_KEY",
    "CREDENTIALS_*",
]

# =============================================================================
# 禁止コマンドパターン（将来の拡張用）
# =============================================================================

# 注意: 現時点でCodex CLIはコマンドレベルの制約をサポートしていない可能性がある
# 以下は将来の機能拡張に備えた設定例

# [command_restrictions]
# deny_patterns = [
#     "rm -rf /",
#     "rm -rf ~",
#     "rm -rf /*",
#     "dd if=*/dev/*",
#     "mkfs.*",
#     "chmod -R 777 /",
#     "curl * | *sh",
#     "wget * | *sh",
# ]

# =============================================================================
# 監査設定
# =============================================================================

# [audit]
# すべての操作をログに記録
# log_all_operations = true
# シークレットをマスク
# mask_secrets = true

# =============================================================================
# 備考
# =============================================================================

# このファイルは以下の目的で使用される：
#
# 1. セキュリティベースラインの維持
#    - 危険なサンドボックスモード（danger-full-access）の禁止
#    - 承認なし実行（never）の禁止
#
# 2. シークレット漏洩の防止
#    - 認証情報を含む環境変数の強制除外
#
# 3. 組織ポリシーの強制
#    - MDM経由での配布により、全端末に適用可能
#
# エンタープライズ環境では、このファイルを中央管理し、
# 開発者端末に配布することを推奨する
