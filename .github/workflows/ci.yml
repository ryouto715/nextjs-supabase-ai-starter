name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static:
    name: Static checks (lint + typecheck + unit test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
        env:
          # 単体テストでは実 DB を叩かない前提。環境変数は schema parse の最低限のみ。
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  e2e:
    name: E2E (Playwright + Supabase Local)
    runs-on: ubuntu-latest
    needs: static
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      # supabase CLI が起動した Local の既定 anon key / service role key は
      # ランタイムで `supabase status -o json` から取得する。
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: npm ci

      - name: Start Supabase Local
        run: supabase start

      - name: Export Supabase env
        id: supabase
        run: |
          ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')
          DB_URL=$(supabase status -o json | jq -r '.DB_URL')
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Stop Supabase Local
        if: always()
        run: supabase stop --no-backup
