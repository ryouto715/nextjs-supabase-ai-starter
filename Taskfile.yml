version: "3"

tasks:
  default:
    desc: 利用可能なタスクを表示
    cmd: task -l

  precommit:
    desc: コミット前チェック（lint + typecheck + test + format）
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: format:check

  lint:
    desc: ESLint 実行
    cmd: npm run lint

  typecheck:
    desc: TypeScript 型チェック
    cmd: npm run typecheck

  test:
    desc: Vitest 実行
    cmd: npm test

  e2e:
    desc: Playwright E2E 実行（webServer 自動起動）
    cmd: npm run e2e

  e2e:ui:
    desc: Playwright E2E を UI モードで起動
    cmd: npm run e2e:ui

  format:
    desc: Prettier で整形
    cmd: npm run format

  format:check:
    desc: Prettier フォーマット確認（CI 向け）
    cmd: npm run format:check

  build:
    desc: Next.js ビルド
    cmd: npm run build

  dev:
    desc: 開発サーバー起動
    cmd: npm run dev
